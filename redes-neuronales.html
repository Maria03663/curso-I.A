<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redes Neuronales y Deep Learning | Campus I.A.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0f; --bg-card: rgba(15,15,25,0.7); --bg-card-hover: rgba(20,20,35,0.85);
            --green: #98CA3F; --green-glow: rgba(152,202,63,0.35);
            --purple: #8B5CF6; --purple-glow: rgba(139,92,246,0.35);
            --pink: #EC4899; --pink-glow: rgba(236,72,153,0.35);
            --blue: #3B82F6; --blue-glow: rgba(59,130,246,0.35);
            --text: #E2E8F0; --text-secondary: #94A3B8; --text-muted: #64748B;
            --border: rgba(255,255,255,0.08); --border-hover: rgba(255,255,255,0.18);
            --radius: 14px; --radius-sm: 10px;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
            --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
        }
        * { margin:0;padding:0;box-sizing:border-box }
        html { scroll-behavior:smooth }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; line-height:1.6 }
        #bgCanvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none }
        .grid-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background-image:linear-gradient(rgba(152,202,63,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(152,202,63,0.03) 1px,transparent 1px); background-size:50px 50px; z-index:0; pointer-events:none }
        .container { max-width:1200px; margin:0 auto; padding:0 24px; position:relative; z-index:1 }

        /* NAVBAR */
        .navbar { position:fixed; top:0; left:0; right:0; z-index:100; padding:14px 0; transition:all .25s; background:transparent }
        .navbar.scrolled { background:rgba(10,10,15,0.92); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); box-shadow:0 4px 20px rgba(0,0,0,0.3) }
        .navbar .container { display:flex; align-items:center; justify-content:space-between }
        .nav-logo { font-size:1.4rem; font-weight:800; color:#fff; text-decoration:none; display:flex; align-items:center; gap:10px }
        .nav-logo i { color:var(--green); font-size:1.3rem }
        .nav-logo span { color:var(--green); font-family:'Syne',sans-serif }
        .nav-links { display:flex; align-items:center; gap:4px }
        .nav-links a { color:var(--text-secondary); text-decoration:none; font-size:.88rem; font-weight:500; padding:8px 16px; border-radius:8px; transition:all .2s }
        .nav-links a:hover { color:#fff; background:rgba(255,255,255,0.05) }
        .nav-toggle { display:none; background:none; border:1px solid var(--border); color:#fff; padding:8px 12px; border-radius:8px; cursor:pointer; font-size:1.2rem }
        @media(max-width:768px) {
            .nav-toggle{display:block}.nav-links{display:none;position:absolute;top:100%;left:0;right:0;background:rgba(10,10,15,0.96);backdrop-filter:blur(20px);flex-direction:column;padding:16px;gap:4px;border-bottom:1px solid var(--border)}
            .nav-links.open{display:flex}
        }

        /* PROGRESS BAR */
        .progress-bar-wrapper { position:fixed; top:0; left:0; right:0; height:3px; z-index:101; background:rgba(255,255,255,0.04) }
        .progress-bar-fill { height:100%; background:linear-gradient(90deg,var(--purple),var(--pink)); transition:width .5s ease; border-radius:0 2px 2px 0 }

        /* COURSE HEADER */
        .course-hero { padding:120px 0 50px; position:relative; z-index:1 }
        .course-hero .container { max-width:800px }
        .course-badge { display:inline-flex; align-items:center; gap:8px; padding:6px 16px; border-radius:20px; background:rgba(139,92,246,0.1); border:1px solid rgba(139,92,246,0.25); font-size:.78rem; color:var(--purple); font-weight:600; margin-bottom:20px }
        .course-hero h1 { font-size:clamp(2rem,4.5vw,3rem); font-weight:900; line-height:1.2; margin-bottom:16px; font-family:'Syne',sans-serif }
        .course-hero .desc { font-size:1.05rem; color:var(--text-secondary); line-height:1.8; max-width:620px }

        /* ===== NEW SECTIONS ===== */

        /* SECTION WRAPPER */
        .course-section { padding:50px 0; position:relative; z-index:1 }
        .course-section .container { max-width:900px }
        .section-label { font-size:.75rem; font-weight:700; color:var(--purple); letter-spacing:3px; text-transform:uppercase; margin-bottom:6px }
        .section-title { font-size:1.5rem; font-weight:800; margin-bottom:24px; font-family:'Syne',sans-serif; color:#fff }

        /* 1. STATS SIDEBAR */
        .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; background:var(--bg-card); backdrop-filter:blur(16px); border:1px solid var(--border); border-radius:var(--radius); padding:28px 32px; box-shadow:var(--shadow) }
        .stats-col { display:flex; flex-direction:column; gap:14px }
        .stat-item { display:flex; align-items:center; gap:12px; font-size:.88rem; color:var(--text-secondary) }
        .stat-item i { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:.78rem; flex-shrink:0 }
        .stat-item .icon-green { background:rgba(152,202,63,0.12); color:var(--green) }
        .stat-item .icon-purple { background:rgba(139,92,246,0.12); color:var(--purple) }
        .stat-item .icon-pink { background:rgba(236,72,153,0.12); color:var(--pink) }
        .stat-item .icon-blue { background:rgba(59,130,246,0.12); color:var(--blue) }
        .stat-item strong { color:#fff; font-weight:600 }
        .badge-pink { display:inline-block; padding:2px 10px; border-radius:12px; background:rgba(236,72,153,0.15); color:var(--pink); font-size:.72rem; font-weight:700 }
        .stats-cta { margin-top:10px }
        .btn-primary { display:inline-flex; align-items:center; gap:8px; padding:12px 28px; border-radius:var(--radius-sm); background:linear-gradient(135deg,var(--purple),var(--pink)); color:#fff; font-weight:700; font-size:.9rem; border:none; cursor:pointer; text-decoration:none; transition:all .3s; box-shadow:0 4px 20px rgba(139,92,246,0.3) }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 6px 30px rgba(139,92,246,0.45) }
        .cert-badge { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:20px; background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.2); color:#FBBF24; font-size:.78rem; font-weight:600 }

        /* 2. SKILLS GRID */
        .skills-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px }
        @media(max-width:640px){.skills-grid{grid-template-columns:1fr}}
        .skill-card { display:flex; align-items:flex-start; gap:12px; background:var(--bg-card); backdrop-filter:blur(16px); border:1px solid var(--border); border-radius:var(--radius-sm); padding:16px 18px; transition:all .25s }
        .skill-card:hover { border-color:var(--border-hover); background:var(--bg-card-hover); transform:translateY(-2px) }
        .skill-icon { width:36px; height:36px; border-radius:10px; background:rgba(139,92,246,0.1); border:1px solid rgba(139,92,246,0.15); display:flex; align-items:center; justify-content:center; font-size:.85rem; color:var(--purple); flex-shrink:0 }
        .skill-card p { font-size:.85rem; color:var(--text-secondary); line-height:1.6 }

        /* 3. INSTRUCTOR */
        .instructor-card { display:flex; gap:24px; background:var(--bg-card); backdrop-filter:blur(16px); border:1px solid var(--border); border-radius:var(--radius); padding:28px 32px; box-shadow:var(--shadow); align-items:flex-start }
        @media(max-width:640px){.instructor-card{flex-direction:column;align-items:center;text-align:center}}
        .instructor-avatar { width:100px; height:100px; border-radius:50%; background:linear-gradient(135deg,var(--purple),var(--pink)); display:flex; align-items:center; justify-content:center; font-size:2.5rem; color:#fff; flex-shrink:0; box-shadow:0 0 30px rgba(139,92,246,0.25) }
        .instructor-info h4 { font-size:1.1rem; font-weight:700; color:#fff; margin-bottom:2px }
        .instructor-info .role { font-size:.82rem; color:var(--purple); font-weight:600; margin-bottom:10px }
        .instructor-info p { font-size:.85rem; color:var(--text-secondary); line-height:1.7 }
        .instructor-stats { display:flex; gap:16px; margin-top:12px; flex-wrap:wrap }
        .instructor-stats span { font-size:.78rem; color:var(--text-muted); display:flex; align-items:center; gap:6px }

        /* 4. PROYECTO */
        .project-card { background:var(--bg-card); backdrop-filter:blur(16px); border:1px solid var(--border); border-radius:var(--radius); padding:28px 32px; box-shadow:var(--shadow); position:relative; overflow:hidden }
        .project-card::before { content:''; position:absolute; top:0; right:0; width:200px; height:200px; background:radial-gradient(circle,rgba(139,92,246,0.08),transparent 70%); pointer-events:none }
        .project-card h4 { font-size:1.1rem; font-weight:700; color:#fff; margin-bottom:8px; display:flex; align-items:center; gap:10px }
        .project-card h4 i { color:var(--pink) }
        .project-card p { font-size:.85rem; color:var(--text-secondary); line-height:1.7; margin-bottom:16px }
        .project-steps { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px }
        @media(max-width:640px){.project-steps{grid-template-columns:1fr}}
        .project-step { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px 16px; text-align:center }
